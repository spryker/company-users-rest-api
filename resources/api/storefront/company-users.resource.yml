resource:
    name: CompanyUsers
    shortName: company-users
    description: 'Company user information for authenticated company users'

    provider: Spryker\Glue\CompanyUsersRestApi\Api\Storefront\Provider\CompanyUsersStorefrontProvider

    paginationEnabled: true

    security: "is_granted('ROLE_CUSTOMER') or is_granted('ROLE_COMPANY_USER')"

    operations:
        # BC: legacy `GET /company-users/mine` returned a JSON:API collection envelope.
        # Declared before `/company-users/{uuid}` so the literal route wins over the parameterised one.
        - type: GetCollection
          name: getCompanyUsersMine
          uriTemplate: '/company-users/mine'
          description: 'Retrieve all active company users of the authenticated customer.'

        - type: Get
          name: getCompanyUserByUuid
          uriTemplate: '/company-users/{uuid}'
          description: 'Retrieve a specific company user by UUID. Must belong to the current company; requires SeeCompanyUsers permission.'
          openapiContext:
              responses:
                  200:
                      description: 'Company user returned.'
                  401:
                      description: 'Missing or invalid access token.'
                  403:
                      description: 'Authenticated customer has no active company user session — only emitted for the legacy `/company-users/` shorthand (code 1403).'
                  404:
                      description: "Company user not found, or does not belong to the authenticated user's company (code 1404)."

        - type: GetCollection
          name: getCompanyUserCollection
          uriTemplate: '/company-users'
          description: 'Retrieve company users of the current company. Supports filter[company-business-units]=<uuid> and filter[company-roles]=<uuid>; both can be repeated.'

    includes:
        - relationshipName: companies
          targetResource: Companies
          resolverClass: Spryker\Glue\CompaniesRestApi\Api\Storefront\Relationship\CompaniesRelationshipResolver

        - relationshipName: company-business-units
          targetResource: CompanyBusinessUnits
          resolverClass: Spryker\Glue\CompanyBusinessUnitsRestApi\Api\Storefront\Relationship\CompanyBusinessUnitsRelationshipResolver

        - relationshipName: company-roles
          targetResource: CompanyRoles
          resolverClass: Spryker\Glue\CompanyRolesRestApi\Api\Storefront\Relationship\CompanyRolesRelationshipResolver

        - relationshipName: customers
          targetResource: Customers
          resolverClass: Spryker\Glue\CustomersRestApi\Api\Storefront\Relationship\CustomersRelationshipResolver

    properties:
        # `uuid` is the JSON:API resource id (`data.id`), not an attribute.
        uuid:
            type: string
            identifier: true
            writable: false
            readable: false
            required: false
            description: 'Unique company user identifier'
            openapiContext:
                example: 'f9c64276-a8b9-57f1-8fb3-a19c045dc85e'

        isActive:
            type: boolean
            writable: false
            readable: true
            required: false
            description: 'Whether the company user is active'
            openapiContext:
                example: true

        isDefault:
            type: boolean
            writable: false
            readable: true
            required: false
            description: 'Whether the company user is the default one for the customer'
            openapiContext:
                example: false

        idCompany:
            type: integer
            writable: false
            readable: false
            description: 'Internal FK used by relationship resolvers; not part of the public attribute set.'

        idCompanyBusinessUnit:
            type: integer
            writable: false
            readable: false
            description: 'Internal FK used by relationship resolvers; not part of the public attribute set.'

        idCompanyUser:
            type: integer
            writable: false
            readable: false
            description: 'Internal FK used by relationship resolvers; not part of the public attribute set.'

        customerReference:
            type: string
            writable: false
            readable: false
            description: 'Internal FK used by relationship resolvers; not part of the public attribute set.'

        customerTransferData:
            type: object
            writable: false
            readable: false
            description: 'Internal carrier: CustomerTransfer::toArray() payload used by CustomersRelationshipResolver to avoid N+1 client calls.'
